[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    unit: 单元测试(快速,不依赖外部服务)
    integration: 集成测试(碰 MCP,mock LLM)
    e2e: 端到端测试(真实 LLM 调用,默认 skip)
    slow: 慢测试(>5 秒)

timeout = 60

norecursedirs = .git .pytest_cache logs output .gamedev_cache
